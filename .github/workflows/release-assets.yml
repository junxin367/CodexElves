name: Release assets

on:
  release:
    types: [published]
  push:
    tags:
      - "v*"
      - "V*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.0"
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag || github.ref_name }}

jobs:
  ensure-release:
    name: Ensure GitHub Release
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.release-tag.outputs.tag }}
    steps:
      - name: Resolve release tag
        id: release-tag
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "$RELEASE_TAG" ]; then
            echo "Release tag is empty" >&2
            exit 1
          fi
          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

      - name: Create release when missing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.release-tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          VERSION="${VERSION#V}"
          cat > release-notes.md <<EOF
          ## $TAG

          CodexElves $VERSION 发布版本。

          ### 安装包
          - Windows: \`CodexElves-$VERSION-windows-x64-setup.exe\`
          - macOS Intel: \`CodexElves-$VERSION-macos-x64.dmg\`
          - macOS Apple Silicon: \`CodexElves-$VERSION-macos-arm64.dmg\`

          ### 说明
          - 本 Release 由 GitHub Actions 自动编译并上传安装资产。
          - \`latest.json\` 会在所有平台资产上传后自动更新。

          ### 完整变更
          https://github.com/$REPO/commits/$TAG
          EOF
          if gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            echo "Release already exists: $TAG"
            BODY="$(gh release view "$TAG" --repo "$REPO" --json body --jq .body)"
            if [ -z "$BODY" ] || [[ "$BODY" == "**Full Changelog**"* ]]; then
              gh release edit "$TAG" --repo "$REPO" --notes-file release-notes.md
            fi
          else
            gh release create "$TAG" --repo "$REPO" --title "$TAG" --notes-file release-notes.md --target "$GITHUB_SHA"
          fi

  windows-installer:
    runs-on: windows-latest
    needs: ensure-release
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.ensure-release.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install NSIS
        run: choco install nsis -y

      - name: Install frontend dependencies
        working-directory: apps/codex-elves-manager
        run: npm ci

      - name: Build frontend
        working-directory: apps/codex-elves-manager
        run: npm run vite:build

      - name: Build binaries
        run: cargo build --release

      - name: Stage Windows app files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/windows/app | Out-Null
          Copy-Item target/release/codex-elves.exe dist/windows/app/
          Copy-Item target/release/codex-elves-manager.exe dist/windows/app/

      - name: Build Windows installer
        shell: pwsh
        run: |
          $version = "${{ needs.ensure-release.outputs.tag }}".TrimStart("v", "V")
          $makensis = "${env:ProgramFiles(x86)}\NSIS\makensis.exe"
          if (-not (Test-Path $makensis)) {
            $makensis = "makensis"
          }
          Push-Location scripts/installer/windows
          & $makensis "/INPUTCHARSET" "UTF8" "/DVERSION=$version" CodexElves.nsi
          Pop-Location

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.ensure-release.outputs.tag }}
          files: dist/windows/*.exe

  macos-dmg:
    name: macOS DMG (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: ensure-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            runner: macos-15-intel
            target: x86_64-apple-darwin
          - arch: arm64
            runner: macos-14
            target: aarch64-apple-darwin
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.ensure-release.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install frontend dependencies
        working-directory: apps/codex-elves-manager
        run: npm ci

      - name: Build frontend
        working-directory: apps/codex-elves-manager
        run: npm run vite:build

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }}

      - name: Build macOS DMG
        env:
          RELEASE_TAG: ${{ needs.ensure-release.outputs.tag }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          VERSION="${VERSION#V}"
          BINARY_DIR="$PWD/target/${{ matrix.target }}/release" bash scripts/installer/macos/package-dmg.sh "$VERSION" "${{ matrix.arch }}"

      - name: Verify macOS bundle structure
        run: |
          set -euo pipefail
          test -L "dist/macos/stage/Applications"
          test "$(readlink "dist/macos/stage/Applications")" = "/Applications"
          for app in "dist/macos/stage/CodexElves.app" "dist/macos/stage/CodexElves 管理工具.app"; do
            test -f "$app/Contents/Info.plist"
            test -f "$app/Contents/PkgInfo"
            test -x "$app/Contents/MacOS/$(/usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' "$app/Contents/Info.plist")"
            plutil -lint "$app/Contents/Info.plist" >/dev/null
            codesign -dv "$app" >/dev/null 2>&1
            echo "verified: $app"
          done

      - name: Upload macOS DMG
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.ensure-release.outputs.tag }}
          files: dist/macos/*.dmg

  latest-json:
    name: Upload static latest.json
    runs-on: ubuntu-latest
    needs:
      - ensure-release
      - windows-installer
      - macos-dmg
    steps:
      - name: Generate latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ needs.ensure-release.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release view "$TAG" --repo "$REPO" --json assets,body,tagName,url > release.json
          node <<'NODE'
          const fs = require("fs");
          const release = JSON.parse(fs.readFileSync("release.json", "utf8"));
          const repo = process.env.REPO;
          const tag = release.tagName || process.env.TAG;
          const version = tag.replace(/^v/i, "");
          const baseUrl = `https://github.com/${repo}/releases/download/${tag}`;
          const assets = (release.assets || [])
            .map((asset) => asset.name)
            .filter((name) => name !== "latest.json")
            .map((name) => ({ name, url: `${baseUrl}/${encodeURIComponent(name)}` }));
          const payload = {
            version: `v${version}`,
            url: release.url || `https://github.com/${repo}/releases/tag/${tag}`,
            body: release.body || "",
            assets
          };
          fs.writeFileSync("latest.json", `${JSON.stringify(payload, null, 2)}\n`);
          NODE
          cat latest.json

      - name: Upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.ensure-release.outputs.tag }}
          REPO: ${{ github.repository }}
        shell: bash
        run: gh release upload "$TAG" latest.json --clobber --repo "$REPO"
