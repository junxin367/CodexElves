[default]
description = "Default permissions for CodexElves Manager application commands."
permissions = ["allow-manager-commands"]

[[permission]]
identifier = "allow-manager-commands"
description = "Allows the main manager window to invoke registered application commands."
commands.allow = [
  "apply_pure_api_injection",
  "apply_relay_injection",
  "backend_version",
  "backfill_relay_profile_from_live",
  "check_env_conflicts",
  "check_update",
  "clear_relay_injection",
  "copy_diagnostics",
  "delete_context_entry",
  "delete_local_session",
  "delete_user_script",
  "disable_watcher",
  "enable_watcher",
  "fetch_codex_radar",
  "fetch_relay_profile_models",
  "import_ccs_providers",
  "install_entrypoints",
  "install_market_script",
  "install_watcher",
  "launch_codex_elves",
  "list_context_entries",
  "list_local_sessions",
  "load_ccs_providers",
  "load_overview",
  "load_provider_sync_targets",
  "load_settings",
  "load_watcher_state",
  "open_external_url",
  "perform_update",
  "plugin_marketplace_status",
  "read_latest_logs",
  "read_live_context_entries",
  "read_relay_files",
  "refresh_script_market",
